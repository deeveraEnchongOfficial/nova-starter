services:
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
        container_name: nova-starter-app
        restart: unless-stopped
        ports:
            - "${APP_PORT:-8080}:80"
        environment:
            - APP_ENV=production
            - APP_KEY=${APP_KEY:-}
            - APP_DEBUG=false
            - DB_CONNECTION=${DB_CONNECTION:-sqlite}
            - DB_HOST=${DB_HOST:-db}
            - DB_PORT=${DB_PORT:-3306}
            - DB_DATABASE=${DB_DATABASE:-database/database.sqlite}
            - DB_USERNAME=${DB_USERNAME:-root}
            - DB_PASSWORD=${DB_PASSWORD:-}
            - RUN_SEEDERS=${RUN_SEEDERS:-false}
        volumes:
            - app-storage:/var/www/html/storage
            - app-bootstrap:/var/www/html/bootstrap/cache
        depends_on:
            - db
        networks:
            - nova-network

    db:
        image: mysql:8.4
        container_name: nova-starter-db
        restart: unless-stopped
        environment:
            - MYSQL_DATABASE=${DB_DATABASE:-nova_starter}
            - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-secret}
        ports:
            - "${DB_PORT:-3306}:3306"
        volumes:
            - db-data:/var/lib/mysql
        networks:
            - nova-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: nova-starter-redis
        restart: unless-stopped
        ports:
            - "${REDIS_PORT:-6379}:6379"
        networks:
            - nova-network

volumes:
    app-storage:
    app-bootstrap:
    db-data:

networks:
    nova-network:
        driver: bridge
